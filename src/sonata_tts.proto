syntax = "proto3";

package sonata_tts;

service Tts {
  // Unary synthesis method
  rpc Synthesize (TtsRequest) returns (TtsResponse) {}

  // Server streaming synthesis method
  rpc SynthesizeStream (TtsRequest) returns (stream TtsResponse) {}
}

message TtsRequest {
  string text = 1;
  string language = 2;
  string voice_type = 3;
}

message TtsResponse {
  bytes audio_data = 1;
  uint32 sample_rate = 2;
}